name: Release to PyPI

on:
  push:
    branches:
      - 'main'
    tags:
      - 'v*'
    paths:
      - 'schulportal_hessen/**'
      - 'sph_client/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install build
        run: pip install build
      - name: Build package
        run: python -m build
      - name: Check package
        run: pip install twine && twine check dist/*
      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: python-package
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-package
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://upload.pypi.org/legacy/