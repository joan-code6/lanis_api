name: Update API Docs

on:
  push:
    paths:
      - 'schulportal_hessen/**/*.py'

jobs:
  update-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install beautifulsoup4

      - name: Generate docs
        run: python docs_extractor.py

      - name: Update README with API docs
        run: |
          API_DOCS=$(cat docs/API.md)
          cat > README.md.tmp << 'EOF'
          # sph-client
          
          Python API client for Schulportal Hessen (SPH)
          
          ## Installation
          
          ```bash
          pip install lanis
          ```
          
          ## Usage
          
          ```python
          from lanis import Client
          ```
          
          ## API Reference
          
          <!-- API_DOCS_START -->
          EOF
          cat README.md.tmp > README.md
          echo "$API_DOCS" >> README.md
          echo "<!-- API_DOCS_END -->" >> README.md
          rm README.md.tmp

      - name: Commit and push docs
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add docs/API.md README.md
          git diff --staged --quiet || git commit -m "docs: update API documentation"
          
          git push