name: Update API Docs

on:
  push:
    paths:
      - 'schulportal_hessen/**/*.py'
      - 'template-readme.md'

jobs:
  update-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install beautifulsoup4

      - name: Generate docs
        run: python docs_extractor.py

      - name: Update README with API docs
        run: |
          python -c "
          from pathlib import Path

          api_docs = Path('docs/API.md').read_text(encoding='utf-8')
          template_path = Path('template-readme.md')

          if template_path.exists():
            content = template_path.read_text(encoding='utf-8')
          else:
            content = '# lanis_api\n\n$API_DOCS\n'

          content = content.replace('$API_DOCS', api_docs)
          Path('README.md').write_text(content, encoding='utf-8')
          "

      - name: Commit and push docs
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add docs/API.md README.md
          git diff --staged --quiet || git commit -m "docs: update API documentation"
          
          git push